name: Build E2B Template

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build E2B Template
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: npx tsx sandbox/template.ts